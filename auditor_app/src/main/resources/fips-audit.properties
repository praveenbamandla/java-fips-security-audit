# =============================================================================
# fips-audit.properties -- FIPS Audit Provider Configuration
#
# This file is read from <java.home>/conf/fips-audit.properties at startup.
# It configures the FipsAuditProvider behavior when embedded in a JRE via
# the patch-jre.ps1 approach.
#
# Settings can also be overridden via -D system properties, e.g.:
#   -Dfips.audit.log=C:\logs\fips-audit.log
# System properties take priority over values in this file.
# =============================================================================

# -- Log file path ------------------------------------------------------------
# Absolute or relative path for the FIPS audit log.
# If relative, it resolves against the application's working directory.
# Default: fips-audit.log
fips.audit.log = C:\\logs\\fips-audit.log

# -- Stack trace depth --------------------------------------------------------
# Maximum number of application stack frames to include in each audit entry.
# Set to 0 for no limit.
# Default: 20
fips.audit.stack.depth = 20

# -- Deduplication ------------------------------------------------------------
# When true, each unique violation (same classification + type + algorithm +
# caller site) is logged only once per JVM lifetime.
# Set to false to log every occurrence.
# Default: true
fips.audit.dedupe = true
